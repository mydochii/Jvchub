<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Feed</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial;
    color:white;
}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    padding:10px;
    padding-bottom:70px;
}
.video-card{
    display:flex;
    gap:10px;
    background:#1a1a1a;
    padding:8px;
    border-radius:12px;
    cursor:pointer;
}
.thumb{
    position:relative;
    width:140px;
    flex-shrink:0;
}
.thumb video{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:10px;
}
.play-overlay{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:26px;
    background:rgba(0,0,0,0.6);
    border-radius:50%;
    padding:6px 10px;
}
.title{
    font-size:13px;
    color:#ddd;
    line-height:1.3;
}
.navbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #222;
}
.navbar div{
    font-size:12px;
    opacity:0.7;
}
.navbar .active{
    opacity:1;
    font-weight:bold;
}
#player{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    flex-direction:column;
}
#player video{
    width:95%;
    max-width:500px;
}
#closeBtn{
    position:absolute;
    top:15px;
    right:20px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="app" class="grid"></div>

<div class="navbar">
    <div class="active">Home</div>
    <div>Trending</div>
    <div>Profile</div>
</div>

<div id="player">
    <span id="closeBtn">✕</span>
    <video id="mainVideo" controls playsinline></video>
</div>

<script>
const ad = "https://otieu.com/4/10005133";

const videoList = [
  ["https://cdn.videy.co/zUe5D6Rx1.mp4","📍NG3NT M4M4 M3RTV4 S44T RVM4H S3P1"],
  ["https://cdn.videy.co/dqWsecLg1.mp4","📍K3J4D14N T4K T3RDVG4 NG3NT M4M4 M3RTV4"],
  ["https://cdn.videy.co/zWofCAwV1.mp4","📍D3T1K D3T1K M3N3G4NGK4N NG3NT M4M4"],
  ["https://cdn.videy.co/qXcPZE8J1.mp4","📍S44T SV45N4 M3NDVKVNG NG3NT M4M4 M3RTV4"],
  ["https://cdn.videy.co/IWqbv7S61.mp4","📍4W4LNY4 B14S4 L4M4-L4M4 3N4K"],
  ["https://cdn.videy.co/VHm5hb2w1.mp4","📍K3J4D14N D14M D14M NG3NT S4M4 D0S3N"],
  ["https://cdn.videy.co/9bD4DNT01.mp4","📍T4NP4 R3NC4N4 D1 4J4K IBU M3RTV4 NG3NT"],
  ["https://cdn.videy.co/sl1v7DMr1.mp4","📍M0M3N S3NYP1 NG3NT M4M4 M3RTV4"],
  ["https://cdn.videy.co/pe94raGD1.mp4","📍R4H4514 T3RP3ND4M NG3NT M4M4 M3RTV4"],
  ["https://cdn.videy.co/mWti2u7Z1.mp4","📍K3J4D14N S1NGK4T T4P1 B3R151K0"],
  ["https://cdn.videy.co/N9dHLwIc1.mp4","📍S44T 53MV4 T3RL3N4 M4L4H M1NT4 3GW33"],
  ["https://cdn.videy.co/2rRvKFjn1.mp4","📍K0ND151 54L4H W4KT0 B1R4H1"],
  ["https://cdn.videy.co/p0wOPqvc1.mp4","📍D1 J4M S3P1 NG3NT M4M4 M3RTV4"],
  ["https://cdn.videy.co/4jHA5pNJ1.mp4","📍4W4L T3N4NG 4KH1R M3NY3N4NGK4N"],
  ["https://cdn.videy.co/tNsN9p3c1.mp4","📍T4NP4 4B4 4B4 L4NGSVNG D1 3GGW33"]
];

const app = document.getElementById("app");
const player = document.getElementById("player");
const mainVideo = document.getElementById("mainVideo");
const closeBtn = document.getElementById("closeBtn");

videoList.forEach(v => {

    const card = document.createElement("div");
    card.className = "video-card";

    const thumb = document.createElement("div");
    thumb.className = "thumb";

    const vid = document.createElement("video");
    vid.src = v[0];
    vid.muted = true;
    vid.preload = "metadata";
    vid.playsInline = true;

    const play = document.createElement("div");
    play.className = "play-overlay";
    play.innerHTML = "▶";

    thumb.appendChild(vid);
    thumb.appendChild(play);

    const title = document.createElement("div");
    title.className = "title";
    title.innerHTML = v[1];

    card.appendChild(thumb);
    card.appendChild(title);
    app.appendChild(card);

    card.onclick = () => {
        player.style.display = "flex";
        mainVideo.src = v[0];
        mainVideo.currentTime = 0;
        mainVideo.play();

        // IKLAN AWAL (KLIK)
        window.open(ad,"_blank");

        let ad20 = false;
        let ad40 = false;

        mainVideo.ontimeupdate = () => {
            const t = Math.floor(mainVideo.currentTime);

            if(t >= 20 && !ad20){
                ad20 = true;
                window.open(ad,"_blank");
            }

            if(t >= 40 && !ad40){
                ad40 = true;
                window.open(ad,"_blank");
            }
        };
    };
});

closeBtn.onclick = () => {
    mainVideo.pause();
    mainVideo.src = "";
    player.style.display = "none";
};
</script>

</body>
</html>
